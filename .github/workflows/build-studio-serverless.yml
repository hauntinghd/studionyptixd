name: Build Studio Serverless Image

on:
  workflow_dispatch:       # manual trigger from GitHub Actions tab
  push:
    branches: [master]
    paths:
      - '*.py'
      - 'requirements.txt'
      - 'runpod-serverless/**'
      - 'ViralShorts-App/src/**'
      - 'ViralShorts-App/package*.json'
      - '.github/workflows/build-studio-serverless.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/studio-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod-serverless/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public (RunPod needs unauthenticated pulls)
        run: |
          curl -sf -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/packages/container/studio-backend" \
            -d '{"visibility":"public"}' \
          && echo "Package set to public" \
          || echo "::warning::Could not set package visibility (may need admin:packages scope). RunPod will need registry auth if package stays private."
