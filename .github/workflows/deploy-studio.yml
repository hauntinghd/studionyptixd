name: Deploy Studio

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STUDIO_SSH_HOST }}
          username: ${{ secrets.STUDIO_SSH_USER }}
          key: ${{ secrets.STUDIO_SSH_KEY }}
          port: ${{ secrets.STUDIO_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.STUDIO_APP_DIR }}"
            STUDIO_PORT="${{ secrets.STUDIO_PORT }}"
            SERVICE_NAME="${{ secrets.STUDIO_SERVICE_NAME }}"
            if [ -z "${APP_DIR}" ]; then APP_DIR="$HOME/asd"; fi
            if [ -z "${STUDIO_PORT}" ]; then STUDIO_PORT="8000"; fi
            if [ -z "${SERVICE_NAME}" ]; then SERVICE_NAME="nyptid-studio"; fi

            cd "${APP_DIR}"
            git fetch origin master
            git reset --hard origin/master

            if [ -d "ViralShorts-App" ]; then
              cd ViralShorts-App
              npm ci
              npm run build
              cd ..
            fi

            if command -v systemctl >/dev/null 2>&1; then
              if sudo -n true >/dev/null 2>&1; then
                if [ -f "nyptid-studio.service" ]; then
                  sudo -n cp "nyptid-studio.service" "/etc/systemd/system/${SERVICE_NAME}.service"
                fi
                sudo -n systemctl daemon-reload
                sudo -n systemctl restart "${SERVICE_NAME}"
              else
                systemctl --user daemon-reload || true
                systemctl --user restart "${SERVICE_NAME}"
              fi
            else
              echo "systemctl not found; refusing to start ad-hoc uvicorn process."
              exit 1
            fi
            sleep 3
            curl -fsS "http://127.0.0.1:${STUDIO_PORT}/api/health"
